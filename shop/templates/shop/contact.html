{% extends '_base.html' %}


{% block page_title %} رویال وی‌پی‌ان - تماس با ما{% endblock %}


{% block page_content %}


  <main class="flex-1 container mx-auto px-4 pt-10 pb-16">
    <div class="max-w-2xl">
      <h1 class="text-3xl md:text-5xl font-extrabold">تماس با ما</h1>
      <p class="mt-2 text-slate-300">سوالی دارید؟ تیم ما ۲۴/۷ پاسخگوی شماست.</p>
      <form id="contactForm" class="mt-6 grid gap-4 rounded-xl border border-white/10 bg-white/5 p-5">
        <div class="grid md:grid-cols-2 gap-4">
          <div>
            <label class="label">نام</label>
            <input type="text" class="input" id="contactName" placeholder="نام شما" required />
          </div>
          <div>
            <label class="label">ایمیل</label>
            <input type="email" class="input" id="contactEmail" placeholder="you@email.com" required />
          </div>
        </div>
        <div>
          <label class="label">پیام</label>
          <textarea class="input min-h-[140px]" id="contactMessage" placeholder="پیام خود را بنویسید..." required></textarea>
        </div>
        <button class="btn-primary w-max" type="submit">ارسال پیام</button>
        <p id="contactMsg" class="text-sm text-emerald-400 hidden">سپاس! به‌زودی با شما تماس می‌گیریم.</p>
      </form>
    </div>
  </main>



{% endblock %}
