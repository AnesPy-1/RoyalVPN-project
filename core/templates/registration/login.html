{% extends "_base.html" %}
{% load i18n %}
{% load crispy_forms_tags %}

{% block page_title %}{% trans "Login" %}{% endblock %}

{% block page_content %}
<div class="flex items-center justify-center flex-1 px-4">
  <div class="w-full max-w-md bg-slate-800 rounded-2xl p-8 shadow-lg">
    <h2 class="text-2xl font-bold mb-6 text-center">{% trans "Login" %}</h2>

    <form method="post" action="{% url 'login' %}" class="space-y-4">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit"
              class="w-full py-2 px-4 rounded-lg bg-gradient-to-r from-blue-600 to-fuchsia-600 text-white font-semibold shadow hover:opacity-90 transition">
        {% trans "Login" %}
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-slate-400">
      {% trans "Do not have an account?" %}
      <a href="{% url 'signup' %}" class="text-blue-400 hover:text-blue-300">{% trans "SigUp" %}</a>
    </p>
  </div>
</div>
{% endblock %}
