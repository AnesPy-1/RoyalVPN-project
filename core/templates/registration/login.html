{% extends "_base.html" %}
{% load crispy_forms_tags %}

{% block page_title %}ورود{% endblock %}

{% block page_content %}
<main>
  <section class="auth-section">
    <div class="site-container auth-shell">
      <div class="auth-copy">
        <div class="section-kicker">خوش آمدید</div>
        <h1>ورود</h1>
        <p>برای مدیریت اشتراک، سفارش‌ها و پشتیبانی وارد حساب کاربری خود شوید.</p>
      </div>

      <div class="form-card">
        <form method="post" action="{% url 'login' %}">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn-primary btn-primary--full">ورود</button>
        </form>
        <p class="form-help" style="margin-top:0.9rem;">
          حساب کاربری ندارید؟ <a href="{% url 'signup' %}" class="auth-link">ثبت‌نام کنید</a>
        </p>
      </div>
    </div>
  </section>
</main>
{% endblock %}
