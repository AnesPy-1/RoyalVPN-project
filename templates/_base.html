<!DOCTYPE html>
{% load static %}
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block page_title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col">
    <!-- Header -->
    <header class="sticky top-0 z-40 backdrop-blur supports-[backdrop-filter]:bg-slate-900/70 border-b border-slate-800">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between py-4">
                <a href="{% url 'home' %}" class="flex items-center gap-2">
                    <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-tr from-blue-600 to-fuchsia-600 shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-5 w-5 text-white"><path d="M12 1.5l8.485 4.9v10.2L12 21.5l-8.485-4.9V6.4L12 1.5zm0 2.309L5.015 7.09v9.82L12 20.192l6.985-3.282V7.09L12 3.809z"/></svg>
                    </span>
                    <span class="text-xl font-bold tracking-tight">رویال <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-fuchsia-400">وی‌پی‌ان</span></span>
                </a>
                <button id="navToggle" class="md:hidden p-2 rounded-lg hover:bg-white/5">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <nav id="mainNav" class="hidden md:flex items-center gap-6">
                    <a class="nav-link" href="{% url 'home' %}">خانه</a>
                    <a class="nav-link" href="{% url 'pricing' %}">قیمت‌ها</a>
                    <a class="nav-link" href="about.html">درباره ما</a>
                    <a class="nav-link" href="faq.html">سوالات متداول</a>
                    <a class="nav-link" href="{% url 'contact' %}">تماس با ما</a>
                    <a class="relative group" href="cart.html" aria-label="سبد خرید">
                        <svg class="h-6 w-6 text-slate-300 group-hover:text-white transition-colors" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l3-8H6.4M7 13L5.4 5M7 13l-2 9m12-9l2 9M9 22a1 1 0 100-2 1 1 0 000 2zm8 0a1 1 0 100-2 1 1 0 000 2z"/></svg>
                        <span id="cartCount" class="badge">0</span>
                    </a>
                </nav>
            </div>
            <div id="mobileNav" class="md:hidden hidden pb-4">
                <div class="grid gap-2 text-sm">
                    <a class="nav-link py-2" href="{% url 'home' %}">خانه</a>
                    <a class="nav-link py-2" href="{% url 'pricing' %}">قیمت‌ها</a>
                    <a class="nav-link py-2" href="about.html">درباره ما</a>
                    <a class="nav-link py-2" href="faq.html">سوالات متداول</a>
                    <a class="nav-link py-2" href="contact.html">تماس با ما</a>
                    <a class="nav-link py-2" href="cart.html">سبد خرید</a>
                </div>
            </div>
        </div>
    </header>

    {% block page_content %}

    {% endblock %}

    <!-- Footer -->
    <footer class="mt-10 border-t border-slate-800">
        <div class="container mx-auto px-4 py-10">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <p class="text-slate-400 text-sm">© <span id="year"></span> رویال وی‌پی‌ان. تمامی حقوق محفوظ است.</p>
                <p class="text-slate-500 text-sm">ساخته‌شده توسط <a class="text-slate-300 hover:text-white" href="https://t.me/Anes_py">@Anes_py</a></p>
            </div>
        </div>
    </footer>

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
