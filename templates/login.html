{% extends "base.html" %}
{% load i18n %}

{% block page_title %}{% trans "Login" %}{% endblock %}

{% block page_content %}
<div class="flex items-center justify-center flex-1 px-4">
    <div class="w-full max-w-md bg-slate-800 rounded-2xl p-8 shadow-lg">
        <h2 class="text-2xl font-bold mb-6 text-center">{% trans "Login with Phone" %}</h2>

        <form method="post" action="{% url 'send_otp' %}" class="space-y-4">
            {% csrf_token %}
            <div>
                <label for="phone" class="block text-sm font-medium text-slate-300 mb-1">
                    {% trans "Phone Number" %}
                </label>
                <input type="text" name="phone" id="phone"
                       class="w-full px-4 py-2 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                       placeholder="09XXXXXXXXX" required>
            </div>

            <button type="submit"
                    class="w-full py-2 px-4 rounded-lg bg-gradient-to-r from-blue-600 to-fuchsia-600 text-white font-semibold shadow hover:opacity-90 transition">
                {% trans "Send Code" %}
            </button>
        </form>
    </div>
</div>
{% endblock %}
